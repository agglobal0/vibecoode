<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | FreshBites Kiosk</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="glass">
        <a href="index.html" class="logo">
            <i class="fas fa-arrow-left" style="font-size: 1.2rem; margin-right: 5px;"></i> FreshBites
        </a>
        <div class="header-actions">
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
            <a href="cart.html" class="floating-cart" aria-label="View Cart">
                <i class="fas fa-shopping-basket"></i>
                <span id="cart-badge" class="cart-badge">0</span>
            </a>
        </div>
    </header>

    <main class="page-container">
        <div class="menu-header">
            <h1 class="menu-title">Our Menu</h1>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search for food...">
            </div>
            <div id="category-filters" class="category-filters">
                <!-- Filters injected by JS -->
            </div>
        </div>

        <div id="menu-grid" class="menu-grid">
            <!-- Menu items injected by JS -->
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
