<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshBites | Self-Service Kiosk</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="glass">
        <a href="index.html" class="logo">
            <i class="fas fa-hamburger"></i> FreshBites
        </a>
        <div class="header-actions">
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="page-container hero">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        
        <div class="hero-content glass">
            <h1 class="hero-title">Welcome to <span>FreshBites</span></h1>
            <p class="hero-subtitle">Fresh Food, Fast Ordering</p>
            <a href="menu.html" class="btn btn-primary btn-hero">
                Start Order <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
